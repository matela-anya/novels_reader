<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novels Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="header-top">
                <h1 class="app-title">Novels Reader</h1>
                <button class="become-translator">Стать переводчиком</button>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Поиск новелл или переводчиков...">
                <div class="search-results">
                    <!-- Результаты поиска будут добавляться динамически -->
                </div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" data-mode="reader">Читатель</button>
        <button class="tab" data-mode="translator" style="display: none">Переводчик</button>
    </div>

    <main class="main-content">
        <div id="reader-content">
            <section class="subscriptions">
                <h2>Мои подписки</h2>
                <!-- Подписки будут добавляться динамически -->
            </section>

            <section class="latest-chapters">
                <h2>Последние главы</h2>
                <!-- Последние главы будут добавляться динамически -->
            </section>
        </div>

        <div id="translator-content" style="display: none">
            <!-- Контент переводчика будет добавляться при активации режима переводчика -->
        </div>
    </main>

    <!-- Модальное окно регистрации переводчика -->
    <div class="modal-overlay" id="translatorModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Регистрация переводчика</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-content">
                <form class="translator-form" id="translatorForm" novalidate>
                    <div class="form-group">
                        <label class="form-label">Аватар</label>
                        <div class="avatar-upload">
                            <div class="avatar-container">
                                <div class="avatar-preview">
                                    <img id="avatarPreview" src="/api/placeholder/80/80" alt="Аватар">
                                    <div class="upload-progress">
                                        <div class="upload-progress-bar"></div>
                                    </div>
                                </div>
                                <div class="avatar-actions">
                                    <button type="button" class="avatar-action-button" id="changeAvatar">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 17v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3"/>
                                            <polyline points="16 6 12 2 8 6"/>
                                            <line x1="12" y1="2" x2="12" y2="16"/>
                                        </svg>
                                    </button>
                                    <button type="button" class="avatar-action-button" id="removeAvatar">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 6h18"/>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <input type="file" id="avatarInput" accept="image/*" style="display: none">
                        </div>
                        <div class="upload-hint">Рекомендуемый размер: 200x200px, до 1MB</div>
                        <div class="upload-error" id="uploadError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Имя переводчика *</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            name="translatorName" 
                            required 
                            minlength="2" 
                            maxlength="50" 
                            pattern="^[а-яА-ЯёЁa-zA-Z0-9\s-]+$"
                            placeholder="Как вас будут видеть читатели"
                        >
                        <div class="error-message" data-error="translatorName"></div>
                        <div class="character-counter">0/50</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">О себе *</label>
                        <textarea 
                            class="form-input" 
                            name="description" 
                            required 
                            minlength="50" 
                            maxlength="500" 
                            placeholder="Расскажите о своем опыте перевода, любимых жанрах и т.д."
                        ></textarea>
                        <div class="error-message" data-error="description"></div>
                        <div class="character-counter">0/500</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Социальные сети</label>
                        <div class="social-links">
                            <div class="social-input">
                                <span>Telegram:</span>
                                <input 
                                    type="text" 
                                    class="form-input" 
                                    name="telegram"
                                    pattern="^@[a-zA-Z0-9_]{5,32}$"
                                    placeholder="@username"
                                >
                                <div class="error-message" data-error="telegram"></div>
                            </div>
                            <div class="social-input">
                                <span>Discord:</span>
                                <input 
                                    type="text" 
                                    class="form-input" 
                                    name="discord"
                                    pattern="^.{2,32}#[0-9]{4}$"
                                    placeholder="username#0000"
                                >
                                <div class="error-message" data-error="discord"></div>
                            </div>
                            <div class="social-input">
                                <span>VK:</span>
                                <input 
                                    type="text" 
                                    class="form-input" 
                                    name="vk"
                                    pattern="^(https?:\/\/)?(vk\.com\/)[a-zA-Z0-9_-]+$"
                                    placeholder="vk.com/username"
                                >
                                <div class="error-message" data-error="vk"></div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-button" id="submitButton">
                        Стать переводчиком
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальное окно для обрезки изображения -->
    <div class="crop-modal" id="cropModal">
        <div class="crop-container slide-up">
            <div class="crop-area">
                <img id="cropImage" class="crop-preview">
            </div>
            <div class="crop-controls">
                <button type="button" class="crop-button secondary" id="cancelCrop">Отмена</button>
                <button type="button" class="crop-button" id="applyCrop">Применить</button>
            </div>
        </div>
    </div>

    <!-- Индикатор загрузки -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
