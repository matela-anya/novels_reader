<div class="app-container">
    <header class="app-header">
        <div class="header-content">
            <div class="header-top">
                <h1 class="app-title">Novels Reader</h1>
                <button class="become-translator">Стать переводчиком</button>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Поиск новелл..." class="search-input">
            </div>
            
            <!-- Навигация по вкладкам -->
            <div class="tabs">
                <button class="tab-button active" data-tab="subscriptions">Подписки</button>
                <button class="tab-button" data-tab="bookmarks">Закладки</button>
                <button class="tab-button" data-tab="latest">Последние главы</button>
            </div>
        </div>
    </header>

    <main class="main-content" role="main">
        <!-- Секция подписок -->
        <section class="section subscriptions active" data-section="subscriptions">
            <div class="section-header">
                <h2 class="section-title">Мои подписки</h2>
                <div class="section-actions">
                    <button class="sort-button">
                        <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 5h10M11 9h7M11 13h4M3 17h18M3 5l4 4-4 4"/>
                        </svg>
                        По обновлению
                    </button>
                </div>
            </div>
            <div class="novels-list"></div>
            <div class="empty-state subscriptions-empty hidden">
                <p>У вас пока нет подписок</p>
                <small>Подпишитесь на новеллы, чтобы следить за обновлениями</small>
            </div>
        </section>

        <!-- Секция закладок -->
        <section class="section bookmarks" data-section="bookmarks">
            <div class="section-header">
                <h2 class="section-title">Мои закладки</h2>
            </div>
            <div class="novels-list"></div>
            <div class="empty-state bookmarks-empty hidden">
                <p>У вас пока нет закладок</p>
                <small>Добавляйте новеллы в закладки, чтобы быстро находить их</small>
            </div>
        </section>

        <!-- Секция последних глав -->
        <section class="section latest-chapters" data-section="latest">
            <div class="section-header">
                <h2 class="section-title">Последние главы</h2>
                <div class="section-actions">
                    <button class="filter-button">
                        <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>
                        </svg>
                        Только из подписок
                    </button>
                </div>
            </div>
            <div class="chapters-list"></div>
        </section>
    </main>
</div>

<!-- Модальное окно переводчика (оставляем как есть) -->
<div class="modal-overlay" id="translatorModal">
    <!-- ... содержимое модального окна ... -->
</div>
