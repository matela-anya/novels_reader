<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novels Reader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="header-top">
                    <h1 class="app-title">Novels Reader</h1>
                    <button class="become-translator">Стать переводчиком</button>
                </div>
                <div class="search-bar">
                    <input type="text" class="search-input" placeholder="Поиск новелл или переводчиков...">
                </div>
            </div>
        </header>

        <h2 class="cabinet-title">Кабинет читателя</h2>

        <main class="main-content">
            <div id="reader-content">
                <section class="subscriptions">
                    <h2 class="section-title">Мои подписки</h2>
                    <div class="novels-list">
                        <a href="#" class="novel-card">
                            <div class="novel-info">
                                <h3 class="novel-title">Возрождение после смерти</h3>
                                <div class="novel-meta">
                                    <span class="translator">TowerTeam</span>
                                    <span class="chapter-count">156 глав</span>
                                </div>
                            </div>
                            <div class="card-arrow">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 18l6-6-6-6"/>
                                </svg>
                            </div>
                        </a>
                        
                        <a href="#" class="novel-card">
                            <div class="novel-info">
                                <h3 class="novel-title">Монарх упадка</h3>
                                <div class="novel-meta">
                                    <span class="translator">NovelGroup</span>
                                    <span class="chapter-count">89 глав</span>
                                </div>
                            </div>
                            <div class="card-arrow">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 18l6-6-6-6"/>
                                </svg>
                            </div>
                        </a>
                    </div>
                </section>

                <section class="latest-chapters">
                    <h2 class="section-title">Последние главы</h2>
                    <div class="chapters-list">
                        <div class="chapter-card">
                            <div class="chapter-content">
                                <h3 class="chapter-title">Глава 156: Начало конца</h3>
                                <div class="chapter-details">
                                    <div class="chapter-meta">
                                        <span class="novel-name">Возрождение после смерти</span>
                                        <span class="chapter-date">Сегодня</span>
                                    </div>
                                    <button class="action-button read">Читать</button>
                                </div>
                            </div>
                        </div>

                        <div class="chapter-card">
                            <div class="chapter-content">
                                <h3 class="chapter-title">Глава 89: Последний бой</h3>
                                <div class="chapter-details">
                                    <div class="chapter-meta">
                                        <span class="novel-name">Монарх упадка</span>
                                        <span class="chapter-date">Вчера</span>
                                    </div>
                                    <button class="action-button read">Читать</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
